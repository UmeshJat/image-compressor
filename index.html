<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Compressor 5KB - 10KB</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.container{
    width:100%;
    max-width:750px;
}

.box{
    background:#fff;
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:18px;
}

.upload-area{
    border:2px dashed #4facfe;
    border-radius:12px;
    padding:22px;
    text-align:center;
    background:#f8fbff;
}

input[type=file]{
    display:none;
}

.upload-btn{
    display:inline-block;
    background:#4facfe;
    color:#fff;
    padding:11px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.info{
    margin-top:15px;
    background:#f5f5f5;
    padding:12px;
    border-radius:10px;
}

.preview-box{
    margin-top:18px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
    gap:10px;
    max-height:380px;
    overflow-y:auto;
    padding-right:5px;
}

.preview-item{
    border:1px solid #ddd;
    border-radius:8px;
    padding:5px;
    text-align:center;
    background:#fafafa;
}

.preview-item img{
    width:100%;
    height:60px;
    object-fit:cover;
    border-radius:5px;
}

.preview-item p{
    font-size:10px;
    margin-top:4px;
}

.download-single{
    margin-top:5px;
    font-size:10px;
    padding:4px;
    border:none;
    background:#28a745;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
    width:100%;
}

.buttons{
    margin-top:18px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.zip-btn{
    background:#673ab7;
    padding:11px;
    border:none;
    border-radius:10px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

.reset-btn{
    background:#ff5252;
    padding:11px;
    border:none;
    border-radius:10px;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    width:100%;
}

.progress-container{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
    display:none;
}

.progress-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#4facfe,#00f2fe);
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h2>Image Compressor (5KB - 10KB)</h2>

<div class="upload-area">
<label for="upload" class="upload-btn">Choose Images</label>
<input type="file" id="upload" multiple accept="image/*">
<p style="margin-top:10px;font-size:13px;">Upload JPG / PNG Images</p>
</div>

<div class="info">
<p id="status">Status: Waiting for images...</p>

<div class="progress-container" id="progressContainer">
<div class="progress-bar" id="progressBar"></div>
</div>
</div>

<div class="preview-box" id="preview"></div>

<div class="buttons">
<button class="zip-btn" id="zipBtn" disabled>ZIP Download</button>
<button class="reset-btn" id="resetBtn">Reset</button>
</div>

</div>
</div>

<script>

let compressedFiles = [];

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const statusText = document.getElementById("status");
const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");
const zipBtn = document.getElementById("zipBtn");
const resetBtn = document.getElementById("resetBtn");

/* UPLOAD */
upload.addEventListener("change", async function(e){

const files = Array.from(e.target.files);
if(files.length === 0) return;

compressedFiles = [];
preview.innerHTML = "";
zipBtn.disabled = true;

progressContainer.style.display = "block";
progressBar.style.width = "0%";

/* 🔥 COUNTING ADDED */
let totalFiles = files.length;
let processed = 0;

statusText.innerHTML = `Processing ${processed}/${totalFiles}`;

for(let i=0;i<files.length;i++){

const file = files[i];
const fileSizeKB = file.size / 1024;

let finalBlob;

/* SKIP SMALL FILES */
if(fileSizeKB <= 10){

processed++;
finalBlob = file;

statusText.innerHTML = `Skipping ${processed}/${totalFiles} (already small): ${file.name}`;

}else{

statusText.innerHTML = `Processing ${processed+1}/${totalFiles} - ${file.name}`;

finalBlob = await compressImage(file);
processed++;

}

/* STORE */
compressedFiles.push({
name: file.name,
blob: finalBlob
});

/* PREVIEW */
const div = document.createElement("div");
div.className = "preview-item";

const img = document.createElement("img");
img.src = URL.createObjectURL(finalBlob);

const size = (finalBlob.size / 1024).toFixed(2);

div.innerHTML = `
<p>${size} KB</p>
<button class="download-single">Download</button>
`;

div.prepend(img);

preview.appendChild(div);

/* SINGLE DOWNLOAD */
div.querySelector(".download-single").addEventListener("click", () => {
const a = document.createElement("a");
a.href = URL.createObjectURL(finalBlob);
a.download = file.name;
a.click();
});

/* PROGRESS */
progressBar.style.width = ((i+1)/totalFiles)*100 + "%";

}

statusText.innerHTML = `Done! Processed ${processed}/${totalFiles}`;
zipBtn.disabled = false;

});

/* COMPRESS FUNCTION */
async function compressImage(file){

return new Promise((resolve)=>{

const img = new Image();
img.src = URL.createObjectURL(file);

img.onload = async function(){

let width = img.width * 0.5;
let height = img.height * 0.5;

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

let quality = 0.9;
let blob;

while(true){

canvas.width = width;
canvas.height = height;

ctx.drawImage(img,0,0,width,height);

blob = await new Promise(res =>
canvas.toBlob(res,"image/jpeg",quality)
);

const sizeKB = blob.size / 1024;

if(sizeKB >= 5 && sizeKB <= 10) break;

if(sizeKB > 10) quality -= 0.05;

if(quality <= 0.1){
quality = 0.9;
width *= 0.9;
height *= 0.9;
}

if(width < 50 || height < 50) break;
}

resolve(blob);
};
});
}

/* ZIP DOWNLOAD */
zipBtn.addEventListener("click", async ()=>{

statusText.innerHTML = "Creating ZIP...";

const zip = new JSZip();

compressedFiles.forEach(file=>{
zip.file(file.name, file.blob);
});

const content = await zip.generateAsync({type:"blob"});

const a = document.createElement("a");
a.href = URL.createObjectURL(content);
a.download = "compressed-images.zip";
a.click();

statusText.innerHTML = "ZIP Ready!";
});

/* RESET */
resetBtn.addEventListener("click", ()=>{

compressedFiles = [];
upload.value = "";
preview.innerHTML = "";
statusText.innerHTML = "Status: Waiting for images...";
progressBar.style.width = "0%";
progressContainer.style.display = "none";
zipBtn.disabled = true;

});

</script>

</body>
</html>
