<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Photo & Signature Compressor</title>

<!-- JSZIP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- CROPPER -->
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css"
/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
padding:15px;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:100%;
max-width:950px;
}

.box{
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

/* TOP */

.doc-controls{
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
background:#f8fbff;
padding:12px;
border-radius:10px;
}

.doc-box{
display:flex;
align-items:center;
gap:10px;
}

.doc-box select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

.size-info{
font-size:14px;
font-weight:bold;
}

/* UPLOAD */

.upload-area{
border:2px dashed #4facfe;
border-radius:12px;
padding:35px;
text-align:center;
background:#f8fbff;
}

input[type=file]{
display:none;
}

.upload-btn{
display:inline-block;
background:#4facfe;
color:#fff;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.upload-btn:hover{
background:#3391ff;
}

/* OPTIONS */

.crop-controls{
margin-top:15px;
display:flex;
justify-content:space-between;
gap:15px;
flex-wrap:wrap;
background:#f8fbff;
padding:12px;
border-radius:10px;
}

.crop-controls select{
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}

/* INFO */

.info{
margin-top:15px;
background:#f5f5f5;
padding:12px;
border-radius:10px;
}

.progress-container{
width:100%;
height:12px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:15px;
display:none;
}

.progress-bar{
width:0%;
height:100%;
background:linear-gradient(90deg,#4facfe,#00f2fe);
transition:0.3s;
}

/* PREVIEW */

.preview-box{
margin-top:18px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:14px;
}

.preview-item{
border:1px solid #ddd;
border-radius:10px;
padding:8px;
text-align:center;
background:#fafafa;
}

.preview-item img{
width:100%;
height:120px;
object-fit:contain;
background:#fff;
border-radius:6px;
}

.preview-item p{
font-size:12px;
margin-top:5px;
word-break:break-word;
}

.download-single{
margin-top:8px;
padding:7px;
border:none;
background:#28a745;
color:#fff;
border-radius:6px;
cursor:pointer;
width:100%;
}

/* BUTTONS */

.buttons{
margin-top:18px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.buttons button{
padding:12px;
border:none;
border-radius:10px;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.zip-btn{
background:#673ab7;
}

.reset-btn{
background:#ff5252;
}

/* MODAL */

.crop-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:flex-start;
z-index:99999;
overflow-y:auto;
padding:20px 10px;
}

.crop-content{
background:#fff;
width:100%;
max-width:900px;
border-radius:15px;
padding:15px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

.crop-content h3{
text-align:center;
font-size:22px;
color:#333;
}

.crop-note{
font-size:13px;
background:#f5f5f5;
padding:10px;
border-radius:8px;
line-height:1.5;
}

.crop-image-container{
width:100%;
height:60vh;
min-height:350px;
background:#000;
border-radius:10px;
overflow:hidden;
position:relative;
}

.crop-image-container img{
display:block;
max-width:100%;
}

/* ZOOM */

.zoom-box{
display:flex;
align-items:center;
gap:10px;
}

.zoom-box label{
font-weight:bold;
white-space:nowrap;
}

.zoom-box input{
flex:1;
}

/* TOOLS */

.crop-tools{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.crop-tools button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#4facfe;
color:#fff;
font-weight:bold;
cursor:pointer;
}

/* ACTION BUTTONS */

.crop-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:5px;
}

#cropConfirm{
padding:14px;
border:none;
border-radius:10px;
background:#28a745;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

#cropSkip{
padding:14px;
border:none;
border-radius:10px;
background:#ff5252;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

.doc-controls,
.crop-controls{
flex-direction:column;
align-items:flex-start;
}

.crop-content{
padding:12px;
}

.crop-image-container{
height:50vh;
min-height:280px;
}

.crop-buttons{
grid-template-columns:1fr;
}

.crop-tools{
justify-content:center;
}

.zoom-box{
flex-direction:column;
align-items:flex-start;
}

.buttons{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="box">

<h2>Advanced Photo & Signature Compressor</h2>

<!-- TYPE -->

<div class="doc-controls">

<div class="doc-box">

<label>Upload Type</label>

<select id="uploadType">
<option value="photo">Photo</option>
<option value="signature">Signature</option>
</select>

</div>

<div class="size-info" id="sizeInfo">
PHOTO: 204×204 px | 200 DPI | 5KB-10KB
</div>

</div>

<!-- UPLOAD -->

<div class="upload-area">

<label for="upload" class="upload-btn">
Choose Images
</label>

<input type="file" id="upload" multiple accept="image/*">

<p style="margin-top:10px;">
Upload JPG / PNG Images
</p>

</div>

<!-- OPTIONS -->

<div class="crop-controls">

<label>
<input type="checkbox" id="enableCrop" checked>
 Enable Advanced Crop
</label>

<div>

<label>Aspect Ratio</label>

<select id="aspectRatio">

<option value="original">Original</option>
<option value="1">1:1</option>
<option value="0.8">4:5</option>
<option value="1.7777777778">16:9</option>

</select>

</div>

</div>

<!-- INFO -->

<div class="info">

<p id="status">
Status: Waiting for images...
</p>

<div class="progress-container" id="progressContainer">
<div class="progress-bar" id="progressBar"></div>
</div>

</div>

<!-- PREVIEW -->

<div class="preview-box" id="preview"></div>

<!-- BUTTONS -->

<div class="buttons">

<button class="zip-btn" id="zipBtn" disabled>
ZIP Download
</button>

<button class="reset-btn" id="resetBtn">
Reset
</button>

</div>

</div>

</div>

<!-- MODAL -->

<div class="crop-modal" id="cropModal">

<div class="crop-content">

<h3>Crop Your Image</h3>

<div class="crop-note">
✔ Drag image freely<br>
✔ Zoom using slider<br>
✔ Rotate image if needed<br>
✔ Double click to reset position
</div>

<div class="crop-image-container">
<img id="cropImage">
</div>

<div class="zoom-box">

<label>Zoom</label>

<input
type="range"
min="0"
max="3"
step="0.1"
value="0"
id="zoomRange"
/>

</div>

<div class="crop-tools">

<button id="rotateLeft">↺ Rotate Left</button>

<button id="rotateRight">↻ Rotate Right</button>

<button id="resetCrop">Reset</button>

</div>

<div class="crop-buttons">

<button id="cropConfirm">
Apply Crop
</button>

<button id="cropSkip">
Skip Crop
</button>

</div>

</div>

</div>

<script>

let compressedFiles = [];
let cropper;

/* DOM */

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");

const statusText = document.getElementById("status");

const progressBar = document.getElementById("progressBar");
const progressContainer = document.getElementById("progressContainer");

const zipBtn = document.getElementById("zipBtn");
const resetBtn = document.getElementById("resetBtn");

const uploadType = document.getElementById("uploadType");
const sizeInfo = document.getElementById("sizeInfo");

const enableCrop = document.getElementById("enableCrop");
const aspectRatioSelect = document.getElementById("aspectRatio");

const cropModal = document.getElementById("cropModal");
const cropImage = document.getElementById("cropImage");

const cropConfirm = document.getElementById("cropConfirm");
const cropSkip = document.getElementById("cropSkip");

const rotateLeft = document.getElementById("rotateLeft");
const rotateRight = document.getElementById("rotateRight");
const resetCrop = document.getElementById("resetCrop");

const zoomRange = document.getElementById("zoomRange");

/* SETTINGS */

const imageSettings = {

photo:{
width:204,
height:204,
dpi:200
},

signature:{
width:333,
height:137,
dpi:200
}

};

/* UPDATE INFO */

uploadType.addEventListener("change",()=>{

const type = uploadType.value;
const config = imageSettings[type];

sizeInfo.innerHTML =
`${type.toUpperCase()}: ${config.width}×${config.height}px | ${config.dpi} DPI | 5KB-10KB`;

});

/* UPLOAD */

upload.addEventListener("change", async function(e){

const files = Array.from(e.target.files);

if(files.length === 0) return;

compressedFiles = [];

preview.innerHTML = "";

zipBtn.disabled = true;

progressContainer.style.display = "block";

for(let i=0;i<files.length;i++){

let file = files[i];

statusText.innerHTML =
`Processing ${i+1}/${files.length}`;

let processedFile = file;

/* CROP */

if(enableCrop.checked){

processedFile =
await openCropper(processedFile);

}

/* RESIZE */

processedFile =
await resizeImage(processedFile);

/* COMPRESS */

const finalBlob =
await compressImage(processedFile);

/* STORE */

compressedFiles.push({
name:file.name,
blob:finalBlob
});

/* PREVIEW */

createPreview(file.name,finalBlob);

/* PROGRESS */

progressBar.style.width =
((i+1)/files.length)*100 + "%";

}

statusText.innerHTML =
"Done!";

zipBtn.disabled = false;

});

/* CROPPER */

async function openCropper(file){

return new Promise((resolve)=>{

const reader = new FileReader();

reader.onload = function(e){

cropModal.style.display = "flex";

cropImage.src = e.target.result;

if(cropper){
cropper.destroy();
}

cropImage.onload = function(){

let ratio;

switch(aspectRatioSelect.value){

case "1":
ratio = 1;
break;

case "0.8":
ratio = 4/5;
break;

case "1.7777777778":
ratio = 16/9;
break;

default:
ratio = NaN;

}

cropper = new Cropper(cropImage,{

aspectRatio:ratio,

viewMode:1,

dragMode:"move",

autoCropArea:0.9,

responsive:true,

background:false,

guides:true,

center:true,

highlight:true,

movable:true,

zoomable:true,

rotatable:true,

scalable:true,

cropBoxMovable:true,

cropBoxResizable:true,

toggleDragModeOnDblclick:true

});

};

};

reader.readAsDataURL(file);

/* APPLY */

cropConfirm.onclick = function(){

const canvas =
cropper.getCroppedCanvas({
imageSmoothingQuality:"high"
});

canvas.toBlob((blob)=>{

cropModal.style.display = "none";

cropper.destroy();

zoomRange.value = 0;

resolve(blob);

},"image/jpeg",1);

};

/* SKIP */

cropSkip.onclick = function(){

cropModal.style.display = "none";

cropper.destroy();

zoomRange.value = 0;

resolve(file);

};

/* TOOLS */

rotateLeft.onclick = ()=>{
cropper.rotate(-90);
};

rotateRight.onclick = ()=>{
cropper.rotate(90);
};

resetCrop.onclick = ()=>{
cropper.reset();
zoomRange.value = 0;
};

zoomRange.oninput = function(){

const value =
parseFloat(this.value);

cropper.zoomTo(value);

};

});

}

/* RESIZE */

async function resizeImage(file){

const type = uploadType.value;
const config = imageSettings[type];

return new Promise((resolve)=>{

const img = new Image();

img.src = URL.createObjectURL(file);

img.onload = function(){

const canvas =
document.createElement("canvas");

canvas.width = config.width;
canvas.height = config.height;

const ctx =
canvas.getContext("2d");

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = "high";

ctx.fillStyle = "#fff";

ctx.fillRect(
0,
0,
config.width,
config.height
);

ctx.drawImage(
img,
0,
0,
config.width,
config.height
);

canvas.toBlob((blob)=>{

resolve(blob);

},"image/jpeg",1);

};

});

}

/* COMPRESS */

async function compressImage(file){

return new Promise((resolve)=>{

const img = new Image();

img.src = URL.createObjectURL(file);

img.onload = async function(){

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

let width = img.width;
let height = img.height;

canvas.width = width;
canvas.height = height;

let quality = 0.95;

let blob;
let attempts = 0;

while(attempts < 80){

attempts++;

ctx.clearRect(0,0,width,height);

ctx.drawImage(
img,
0,
0,
width,
height
);

blob =
await new Promise(res =>
canvas.toBlob(
res,
"image/jpeg",
quality
)
);

const sizeKB =
blob.size / 1024;

if(sizeKB >= 5 && sizeKB <= 10){
break;
}

if(sizeKB > 10){

quality -= 0.02;

if(quality < 0.1){

quality = 0.9;

width *= 0.97;
height *= 0.97;

canvas.width = width;
canvas.height = height;

}

}else{

quality += 0.01;

if(quality >= 1){
break;
}

}

}

if(!blob){

blob =
await new Promise(res =>
canvas.toBlob(
res,
"image/jpeg",
0.8
)
);

}

resolve(blob);

};

});

}

/* PREVIEW */

function createPreview(name,blob){

const div =
document.createElement("div");

div.className =
"preview-item";

const img =
document.createElement("img");

img.src =
URL.createObjectURL(blob);

const size =
(blob.size / 1024).toFixed(2);

div.innerHTML = `
<p>${name}</p>
<p>${size} KB</p>
<button class="download-single">
Download
</button>
`;

div.prepend(img);

preview.appendChild(div);

div.querySelector(".download-single")
.addEventListener("click",()=>{

const a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download = name;

a.click();

});

}

/* ZIP */

zipBtn.addEventListener("click", async ()=>{

statusText.innerHTML =
"Creating ZIP...";

const zip = new JSZip();

compressedFiles.forEach(file=>{

zip.file(file.name,file.blob);

});

const content =
await zip.generateAsync({
type:"blob"
});

const a =
document.createElement("a");

a.href =
URL.createObjectURL(content);

a.download =
"compressed-images.zip";

a.click();

statusText.innerHTML =
"ZIP Ready!";

});

/* RESET */

resetBtn.addEventListener("click",()=>{

compressedFiles = [];

upload.value = "";

preview.innerHTML = "";

statusText.innerHTML =
"Status: Waiting for images...";

progressBar.style.width = "0%";

progressContainer.style.display = "none";

zipBtn.disabled = true;

});

</script>

</body>
</html>
